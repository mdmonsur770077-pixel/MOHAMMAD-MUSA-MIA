<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>স্মার্ট লেবার প্রো</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4361ee; --primary-light: #eef0fd;
      --success: #10b981; --success-light: #d1fae5;
      --danger: #ef4444; --danger-light: #fee2e2;
      --warning: #f59e0b; --warning-light: #fef3c7;
      --purple: #8b5cf6; --purple-light: #ede9fe;
      --orange: #f97316; --orange-light: #ffedd5;
      --text: #1f2937; --text-muted: #6b7280;
      --surface: #ffffff; --surface2: #f9fafb;
      --border: #e5e7eb; --border-tertiary: #d1d5db;
      --color-background-secondary: #f3f4f6;
      --color-border-tertiary: #e5e7eb;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      --font: Inter, Hind Siliguri, sans-serif;
    }
    [data-theme="dark"] {
      --text: #f3f4f6; --text-muted: #9ca3af;
      --surface: #111827; --surface2: #1f2937;
      --border: #374151; --border-tertiary: #4b5563;
      --color-background-secondary: #1f2937;
      --color-border-tertiary: #374151;
    }
    html, body { height: 100vh; font-family: var(--font); background: var(--surface); color: var(--text); }
    body { display: flex; flex-direction: column; overflow: hidden; }
    nav {
      background: var(--surface2); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
    }
    .nav-brand { font-size: 18px; font-weight: 700; color: var(--primary); white-space: nowrap; min-width: 150px; }
    .search-bar { flex: 1; min-width: 150px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: var(--surface); color: var(--text); font-family: var(--font); }
    .search-bar::placeholder { color: var(--text-muted); }
    .btn { padding: 8px 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: var(--font); transition: 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-success { background: var(--success); }
    .btn-sm { padding: 6px 10px; font-size: 11px; }
    main { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; }
    
    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; padding: 12px 16px; background: var(--surface2); }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; gap: 10px; align-items: center; }
    .stat-icon { width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .stat-info h4 { font-size: 10px; color: var(--text-muted); margin: 0 0 2px; }
    .stat-info p { font-size: 16px; font-weight: 700; margin: 0; color: var(--text); }
    
    /* MONTH NAV */
    .month-nav { display: flex; gap: 8px; align-items: center; padding: 10px 16px; }
    .month-nav button { padding: 6px 10px; font-size: 11px; }
    #monthLabel { font-weight: 600; color: var(--text); min-width: 120px; text-align: center; font-size: 13px; }
    
    /* GROUP FILTER */
    .group-filter { display: flex; gap: 6px; padding: 10px 16px; flex-wrap: wrap; overflow-x: auto; }
    .group-tag { padding: 4px 10px; background: var(--primary-light); color: var(--primary); border: none; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; }
    .group-tag.active { background: var(--primary); color: white; }
    
    /* SECTION */
    .section-header { font-size: 13px; font-weight: 600; padding: 12px 16px 8px; color: var(--text); }
    
    /* EMPLOYEE GRID */
    .employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; padding: 12px 16px 120px; }
    .emp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; }
    .emp-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
    .emp-card img { width: 100%; height: 80px; border-radius: 8px; object-fit: cover; margin-bottom: 8px; }
    .emp-card h3 { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
    .emp-card p { font-size: 10px; color: var(--text-muted); margin: 0 0 6px; }
    .card-stats { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-stat { background: var(--surface2); padding: 4px 8px; border-radius: 6px; font-size: 9px; }
    .card-stat label { color: var(--text-muted); }
    .card-stat span { color: var(--primary); font-weight: 600; }
    
    /* DRAWER */
    .drawer { background: var(--surface); position: fixed; z-index: 1000; box-shadow: var(--shadow); overflow-y: auto; border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .drawer-header h2 { font-size: 16px; margin: 0; }
    .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 0; }
    
    /* TABS */
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab { padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; }
    .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    /* CALENDAR */
    .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
    .calendar-header span { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surface2); border-radius: 7px; cursor: pointer; font-size: 11px; font-weight: 500; border: 1.5px solid var(--border); transition: 0.15s; line-height: 1.2; min-height: 50px; }
    .day-cell:hover { border-color: var(--primary); background: var(--primary-light); }
    .day-cell.p { background: var(--success-light); border-color: var(--success); color: #065f46; font-weight: 600; }
    .day-cell.h { background: var(--warning-light); border-color: var(--warning); color: #92400e; font-weight: 600; }
    .day-cell.a { background: var(--danger-light); border-color: var(--danger); color: #991b1b; font-weight: 600; }
    .day-cell.holiday { background: var(--purple-light); border-color: var(--purple); color: #5b21b6; font-weight: 600; }
    .day-cell .ot-badge { font-size: 8px; opacity: 0.8; }
    .day-cell .adv-badge { font-size: 8px; color: #c2410c; font-weight: 700; }
    
    /* POPUP */
    .att-popup { display: none; position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); z-index: 9999; padding: 0; min-width: 180px; max-height: 60vh; overflow-y: auto; }
    .att-popup.show { display: block; }
    .att-popup button { width: 100%; padding: 10px 12px; border: none; border-radius: 0; cursor: pointer; font-size: 11px; font-weight: 500; transition: 0.15s; font-family: var(--font); border-bottom: 1px solid var(--border); background: transparent; color: var(--text); }
    .att-popup button:hover { background: var(--surface2); }
    .att-popup button:last-child { border-bottom: none; }
    .att-popup input { width: 100%; padding: 8px 12px; border: none; border-bottom: 1px solid var(--border); font-size: 11px; }
    
    /* FORMS */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
    .input-field { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--surface); color: var(--text); font-family: var(--font); }
    .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(67,97,238,0.1); }
    
    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { background: var(--surface); border-radius: 14px; padding: 20px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }
    
    /* TABLES */
    .report-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .report-table th { background: var(--surface2); padding: 8px; border: 1px solid var(--border); text-align: left; font-weight: 600; }
    .report-table td { padding: 8px; border: 1px solid var(--border); }
    .report-table tr.danger-row { background: var(--danger-light); }
    .report-table tfoot tr { background: var(--surface2); font-weight: 600; }
    
    /* PILLS */
    .summary-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .pill { background: var(--primary-light); color: var(--primary); padding: 4px 10px; border-radius: 14px; font-size: 10px; font-weight: 600; }
    .pill.success { background: var(--success-light); color: var(--success); }
    .pill.warning { background: var(--warning-light); color: var(--warning); }
    .pill.danger { background: var(--danger-light); color: var(--danger); }
    
    /* PRINT */
    .no-print { display: block; }
    @media print {
      .no-print { display: none !important; }
      .drawer { position: static; width: 100%; height: auto; }
      .drawer * { position: static !important; }
    }
    
    /* MOBILE */
    @media(max-width: 600px) {
      nav { padding: 10px 12px; gap: 8px; }
      .nav-brand { font-size: 16px; min-width: 120px; }
      .search-bar { width: 140px; font-size: 12px; padding: 7px 12px; }
      .btn { padding: 8px 14px; font-size: 11px; min-height: 36px; }
      .btn-sm { padding: 6px 10px; font-size: 10px; min-height: 32px; }
      .stats-row, .employee-grid { padding: 0 10px; }
      .employee-grid { padding-bottom: 100px; grid-template-columns: 1fr; }
      .month-nav, .section-header, .group-filter { padding-left: 10px; padding-right: 10px; padding-top: 10px; }
      .drawer { padding: 14px; border-radius: 14px; margin: 16px 0; }
      .drawer-header { flex-direction: column; align-items: flex-start; }
      .drawer-header h2 { font-size: 18px; }
      .tab { padding: 6px 10px; font-size: 11px; flex: 1; text-align: center; }
      .stat-card { padding: 10px 14px; gap: 8px; }
      .stat-icon { width: 36px; height: 36px; font-size: 16px; }
      .stat-info h4 { font-size: 10px; }
      .stat-info p { font-size: 17px; }
      .day-cell { font-size: 12px; min-height: 52px; }
      .emp-card { padding: 12px; }
      .emp-card h3 { font-size: 14px; }
      .form-group label { font-size: 11px; }
      .input-field { padding: 8px 10px; font-size: 12px; min-height: 36px; }
      .att-popup { min-width: 160px; font-size: 12px; }
      .att-popup button { padding: 7px 10px; margin-bottom: 2px; }
    }
  </style>
</head>
<body>
  <nav class="no-print">
    <span class="nav-brand">স্মার্ট লেবার প্রো</span>
    <input type="text" id="searchWorker" class="search-bar" placeholder="শ্রমিক খুঁজুন..." onkeyup="filterWorkers()">
    <button class="btn" onclick="addNewWorker()">➕ নতুন শ্রমিক</button>
    <button class="btn btn-outline" onclick="openMonthlyReport()">📊 রিপোর্ট</button>
    <button class="btn btn-outline" onclick="toggleTheme()">🌙</button>
    <button class="btn btn-outline" onclick="openSettings()">⚙️</button>
  </nav>

  <div class="stats-row" id="statsRow"></div>
  
  <div class="month-nav no-print">
    <button class="btn btn-sm" onclick="prevMonth()">◀ আগের মাস</button>
    <span id="monthLabel" style="flex: 1; text-align: center;"></span>
    <button class="btn btn-sm" onclick="nextMonth()">পরের মাস ▶</button>
  </div>

  <div class="group-filter no-print" id="groupFilter"></div>

  <main>
    <div class="section-header no-print">শ্রমিক তালিকা</div>
    <div class="employee-grid" id="employeeGrid"></div>
  </main>

  <!-- PROFILE DRAWER -->
  <div class="drawer no-print" id="profileDrawer" style="right: -400px; top: 55px; width: 360px; height: calc(100vh - 55px); transition: right 0.3s;">
    <div class="drawer-header">
      <h2 id="profileName">শ্রমিক প্রোফাইল</h2>
      <button class="close-btn" onclick="closeProfile()">✕</button>
    </div>
    <div id="profileContent" style="padding-top: 10px;"></div>
  </div>

  <!-- POPUP FOR ATTENDANCE -->
  <div class="att-popup" id="attPopup"></div>

  <!-- MODAL FOR MONTHLY REPORT -->
  <div class="modal" id="monthOverlay">
    <div class="modal-box">
      <button class="modal-close" onclick="toggleModal('monthOverlay', false)">✕</button>
      <h2 style="margin-bottom: 12px;">📊 মাসিক রিপোর্ট - <span id="monthReportLabel"></span></h2>
      <div id="monthlyTableContainer"></div>
    </div>
  </div>

  <!-- MODAL FOR SETTINGS -->
  <div class="modal" id="settingsOverlay">
    <div class="modal-box">
      <button class="modal-close" onclick="toggleModal('settingsOverlay', false)">✕</button>
      <h2 style="margin-bottom: 12px;">⚙️ সেটিংস</h2>
      <div style="display: grid; gap: 12px;">
        <div class="form-group">
          <label>প্রতিষ্ঠান/সাইট নাম</label>
          <input type="text" id="orgName" class="input-field">
        </div>
        <div class="form-group">
          <label>PIN (৪ অঙ্ক)</label>
          <input type="password" id="pinInput" class="input-field" placeholder="শুধু সংখ্যা" maxlength="4">
        </div>
        <button class="btn btn-success" onclick="saveSettings()">সংরক্ষণ করুন</button>
      </div>
    </div>
  </div>

  <!-- MODAL FOR ADD WORKER -->
  <div class="modal" id="addWorkerOverlay">
    <div class="modal-box">
      <button class="modal-close" onclick="toggleModal('addWorkerOverlay', false)">✕</button>
      <h2 style="margin-bottom: 12px;">👤 নতুন শ্রমিক যোগ করুন</h2>
      <div style="display: grid; gap: 10px;">
        <div class="form-group">
          <label>নাম</label>
          <input type="text" id="workerName" class="input-field">
        </div>
        <div class="form-group">
          <label>পদ</label>
          <input type="text" id="workerRole" class="input-field" placeholder="যেমন: রাজমিস্ত্রি">
        </div>
        <div class="form-group">
          <label>গ্রুপ/দল</label>
          <input type="text" id="workerGroup" class="input-field" placeholder="যেমন: সাইট-A">
        </div>
        <div class="form-group">
          <label>দৈনিক মজুরি (৳)</label>
          <input type="number" id="workerWage" class="input-field" min="0">
        </div>
        <button class="btn btn-success" onclick="saveNewWorker()">যোগ করুন</button>
      </div>
    </div>
  </div>

  <script>
    // ===== DATA MANAGEMENT =====
    let employees = [];
    let selectedEmpId = null;
    let activeTab = 'hajira';
    let viewDate = new Date();
    let selectedGroup = 'সকল';

    const MONTHS_BN = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];

    const BD_HOLIDAYS = {
      '0-26': 'স্বাধীনতা দিবস',
      '3-14': 'বৈশাখী মেলা',
      '4-1': 'মে দিবস',
      '7-15': 'জাতীয় শোক দিবস',
      '11-16': 'বিজয় দিবস',
      '11-25': 'বড়দিন',
    };

    function init() {
      const theme = localStorage.getItem('slp_theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelector('.nav-brand').nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.textContent = theme === 'dark' ? '☀️' : '🌙';

      employees = JSON.parse(localStorage.getItem('slp_v3') || localStorage.getItem('slp_v2') || localStorage.getItem('pro_labor_v4') || '[]');
      render();
    }

    function save() {
      localStorage.setItem('slp_v3', JSON.stringify(employees));
      render();
    }

    function render() {
      renderStats();
      renderGroupFilter();
      renderEmployeeGrid();
    }

    function renderStats() {
      const key = curKey();
      let totalWorkers = employees.length, totalDays = 0, totalPayable = 0, totalOT = 0, totalAdv = 0, totalPaid = 0;
      employees.forEach(e => {
        const s = calcEmpStats(e, key);
        totalDays += s.days;
        totalPayable += s.earned;
        totalOT += s.otHours;
        totalAdv += (s.dailyAdvTotal || 0);
        const paid = (e.payments || []).filter(p => p.type === 'salary' && p.date.startsWith(viewDate.getFullYear() + '-' + (String(viewDate.getMonth() + 1).padStart(2, '0')))).reduce((s, p) => s + p.amount, 0);
        totalPaid += paid;
      });
      const monthCost = totalPayable + totalAdv;
      const remaining = monthCost - totalPaid;
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-icon" style="background:#eef0fd">👷</div><div class="stat-info"><h4>মোট শ্রমিক</h4><p>${totalWorkers}</p></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:var(--success-light)">📅</div><div class="stat-info"><h4>মোট হাজিরা</h4><p>${totalDays}</p></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:var(--purple-light)">⏱</div><div class="stat-info"><h4>ওভারটাইম</h4><p>${totalOT}h</p></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#fff7ed">💸</div><div class="stat-info"><h4>মোট অগ্রিম</h4><p>৳${totalAdv.toLocaleString()}</p></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:var(--danger-light)">💰</div><div class="stat-info"><h4>এই মাসের খরচ</h4><p style="color:var(--danger);font-weight:700">৳${monthCost.toLocaleString()}</p></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:var(--orange-light)">💵</div><div class="stat-info"><h4>পরিশোধ করা</h4><p style="color:var(--success)">৳${totalPaid.toLocaleString()}</p></div></div>
        <div class="stat-card" style="border-left-color:${remaining > 0 ? 'var(--danger)' : 'var(--success)'}"><div class="stat-icon" style="background:${remaining > 0 ? 'var(--danger-light)' : 'var(--success-light)'}">📊</div><div class="stat-info"><h4>${remaining > 0 ? 'বাকি' : 'অতিরিক্ত'}</h4><p style="color:${remaining > 0 ? 'var(--danger)' : 'var(--success)'}">৳${Math.abs(remaining).toLocaleString()}</p></div></div>
      `;
    }

    function renderGroupFilter() {
      const groups = ['সকল', ...new Set(employees.map(e => e.group).filter(g => g))];
      document.getElementById('groupFilter').innerHTML = groups.map(g => `
        <button class="group-tag ${selectedGroup === g ? 'active' : ''}" onclick="setGroup('${g}')">${g}</button>
      `).join('');
    }

    function setGroup(g) {
      selectedGroup = g;
      renderGroupFilter();
      renderEmployeeGrid();
    }

    function filterWorkers() {
      renderEmployeeGrid();
    }

    function renderEmployeeGrid() {
      const query = document.getElementById('searchWorker').value.toLowerCase();
      const filtered = employees.filter(e => {
        const match = e.name.toLowerCase().includes(query);
        const groupMatch = selectedGroup === 'সকল' || e.group === selectedGroup;
        return match && groupMatch;
      });

      const key = curKey();
      const html = filtered.map(e => {
        const s = calcEmpStats(e, key);
        return `
          <div class="emp-card" onclick="openProfile(${e.id})">
            ${e.photo ? `<img src="${e.photo}" alt="${e.name}">` : `<div style="width:100%;height:80px;background:var(--primary-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px">👤</div>`}
            <h3>${e.name}</h3>
            <p>${e.role || '—'} | ${e.group || '—'}</p>
            <div class="card-stats">
              <div class="card-stat"><label>দৈনিক</label><span>৳${e.wage}</span></div>
              <div class="card-stat"><label>হাজির</label><span>${s.days}</span></div>
              <div class="card-stat"><label>পাওনা</label><span>৳${s.earned.toLocaleString()}</span></div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('employeeGrid').innerHTML = html || '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:40px">কোনো শ্রমিক পাওয়া যায়নি</p>';
    }

    function openProfile(id) {
      selectedEmpId = id;
      const emp = employees.find(e => e.id === id);
      if (!emp) return;
      document.getElementById('profileName').textContent = emp.name;
      activeTab = 'hajira';
      renderProfile();
      document.getElementById('profileDrawer').style.right = '0';
    }

    function closeProfile() {
      document.getElementById('profileDrawer').style.right = '-400px';
      selectedEmpId = null;
    }

    function renderProfile() {
      const emp = employees.find(e => e.id === selectedEmpId);
      if (!emp) return;

      let content = '';
      const key = curKey();

      if (activeTab === 'settlement') {
        const s = calcEmpStats(emp, key);
        const led = emp.ledger?.[key] || { bonus: 0, advance: 0 };
        const paid = (emp.payments || []).filter(p => p.type === 'salary' && p.date.startsWith(viewDate.getFullYear() + '-' + (String(viewDate.getMonth() + 1).padStart(2, '0')))).reduce((s, p) => s + p.amount, 0);
        const due = s.earned - paid;
        const yearlyAdvance = (() => { let total = 0; for (let m = 0; m < 12; m++) { const k = getKey(viewDate.getFullYear(), m); total += Object.values(emp.dailyAdvance?.[k] || {}).reduce((s, v) => s + (parseFloat(v) || 0), 0); } return total; })();
        const monthlyAdvance = s.dailyAdvTotal || 0;

        content = `${pillsHTML(emp, key)}
          <div style="display:grid;gap:12px;margin-bottom:16px">
            <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:12px;border-left:3px solid var(--success)">
              <p style="font-size:11px;color:var(--text-muted);margin:0 0 4px">এই মাসে পাওনা</p>
              <p style="font-size:20px;font-weight:700;color:var(--text);margin:0">৳${s.earned.toLocaleString()}</p>
              <p style="font-size:11px;color:var(--text-muted);margin:4px 0 0">মূল: ৳${(s.days * emp.wage).toLocaleString()} + OT: ৳${(s.otHours * s.otRate).toLocaleString()}</p>
            </div>
            <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:12px;border-left:3px solid var(--danger)">
              <p style="font-size:11px;color:var(--text-muted);margin:0 0 4px">এই মাসে দিয়েছেন</p>
              <p style="font-size:20px;font-weight:700;color:var(--text);margin:0">৳${paid.toLocaleString()}</p>
              <p style="font-size:11px;color:var(--text-muted);margin:4px 0 0">${(emp.payments || []).filter(p => p.type === 'salary' && p.date.includes(viewDate.getFullYear() + '-' + (String(viewDate.getMonth() + 1).padStart(2, '0')))).length} পেমেন্ট</p>
            </div>
            <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:12px;border-left:3px solid var(--orange)">
              <p style="font-size:11px;color:var(--text-muted);margin:0 0 4px">বাকি / অতিরিক্ত</p>
              <p style="font-size:20px;font-weight:700;color:${due < 0 ? 'var(--danger)' : 'var(--success)'};margin:0">৳${Math.abs(due).toLocaleString()}</p>
              <p style="font-size:11px;color:var(--text-muted);margin:4px 0 0">${due < 0 ? 'অতিরিক্ত দিয়েছেন' : 'এখনও দেবেন'}</p>
            </div>
          </div>
          <h4 style="font-size:13px;font-weight:600;color:var(--text);margin:16px 0 8px">অগ্রিম বিবরণী</h4>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div style="background:#fff7ed;border:0.5px solid #fed7aa;border-radius:8px;padding:10px">
              <p style="font-size:11px;color:#92400e;font-weight:600;margin:0 0 3px">এই মাসের দৈনিক</p>
              <p style="font-size:16px;font-weight:700;color:#c2410c;margin:0">৳${monthlyAdvance.toLocaleString()}</p>
            </div>
            <div style="background:#ede9fe;border:0.5px solid #c4b5fd;border-radius:8px;padding:10px">
              <p style="font-size:11px;color:#5b21b6;font-weight:600;margin:0 0 3px">মাসিক অগ্রিম</p>
              <p style="font-size:16px;font-weight:700;color:#7f77dd;margin:0">৳${(led.advance || 0).toLocaleString()}</p>
            </div>
            <div style="background:#fee2e2;border:0.5px solid #fca5a5;border-radius:8px;padding:10px">
              <p style="font-size:11px;color:#991b1b;font-weight:600;margin:0 0 3px">বছরব্যাপী</p>
              <p style="font-size:16px;font-weight:700;color:#dc2626;margin:0">৳${yearlyAdvance.toLocaleString()}</p>
            </div>
            <div style="background:#d1fae5;border:0.5px solid #86efac;border-radius:8px;padding:10px">
              <p style="font-size:11px;color:#065f46;font-weight:600;margin:0 0 3px">মোট অগ্রিম</p>
              <p style="font-size:16px;font-weight:700;color:#10b981;margin:0">৳${(monthlyAdvance + (led.advance || 0) + yearlyAdvance).toLocaleString()}</p>
            </div>
          </div>
        `;
      } else if (activeTab === 'hajira') {
        const att = emp.attendance?.[key] || {};
        const ot = emp.overtime?.[key] || {};
        const wdays = ['রবি', 'সোম', 'মঙ্গল', 'বুধ', 'বৃহ', 'শুক্র', 'শনি'];
        const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();

        const totalFullDays = Object.values(att).filter(v => v === 'p').length;
        const totalHalfDays = Object.values(att).filter(v => v === 'h').length;
        const totalAbsent = Object.values(att).filter(v => v === 'a').length;
        const totalHolidays = Object.values(att).filter(v => v === 'holiday').length;
        const totalAdvanceDays = Object.keys(emp.dailyAdvance?.[key] || {}).length;
        const totalWorkedDays = totalFullDays + totalHalfDays + totalHolidays;
        const totalUnmarkedDays = daysInMonth - totalWorkedDays - totalAbsent;

        let cells = '';
        for (let i = 0; i < firstDay; i++) cells += `<div style="min-width:48px"></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
          const st = att[d] || '';
          const hdKey = `${viewDate.getMonth()}-${d}`;
          const isHD = BD_HOLIDAYS[hdKey];
          const otH = ot[d] ? `<span class="ot-badge">${ot[d]}h</span>` : '';
          const cls = st || '';
          const hdTitle = isHD ? ` title="${isHD}"` : '';
          const dayAdv = emp.dailyAdvance?.[key]?.[d];
          const advBadge = dayAdv ? `<span class="adv-badge">৳${dayAdv}</span>` : '';
          cells += `<div class="day-cell ${cls}${isHD && !st ? ' holiday' : ''}" style="min-width:48px"${hdTitle} onclick="dayClick(event,${d})">${d}${otH}${advBadge}</div>`;
        }
        const hdKeys = Object.keys(BD_HOLIDAYS).filter(k => parseInt(k.split('-')[0]) === viewDate.getMonth());
        const hdList = hdKeys.map(k => `<span class="holiday-badge">${parseInt(k.split('-')[1])} ${BD_HOLIDAYS[k]}</span>`).join('');

        content = `${pillsHTML(emp, key)}
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:8px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--text-muted);font-weight:600">📊 পরিসংখ্যান (স্ক্রল করুন)</span>
          </div>
          <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border);padding:8px;background:var(--surface2);margin-bottom:12px">
            <div style="display:flex;gap:8px;min-width:max-content;padding:4px">
              <div style="background:var(--success-light);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px;flex-shrink:0">
                <p style="font-size:11px;color:#065f46;font-weight:600;margin:0 0 4px">✅ পূর্ণ</p>
                <p style="font-size:18px;font-weight:700;color:#10b981;margin:0">${totalFullDays}</p>
              </div>
              <div style="background:var(--warning-light);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px;flex-shrink:0">
                <p style="font-size:11px;color:#92400e;font-weight:600;margin:0 0 4px">🌓 অর্ধবেলা</p>
                <p style="font-size:18px;font-weight:700;color:#f59e0b;margin:0">${totalHalfDays}</p>
              </div>
              <div style="background:var(--danger-light);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px;flex-shrink:0">
                <p style="font-size:11px;color:#991b1b;font-weight:600;margin:0 0 4px">❌ অনুপস্থিত</p>
                <p style="font-size:18px;font-weight:700;color:#ef4444;margin:0">${totalAbsent}</p>
              </div>
              <div style="background:var(--purple-light);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px;flex-shrink:0">
                <p style="font-size:11px;color:#5b21b6;font-weight:600;margin:0 0 4px">🎉 ছুটি</p>
                <p style="font-size:18px;font-weight:700;color:#8b5cf6;margin:0">${totalHolidays}</p>
              </div>
              <div style="background:#fff7ed;border-radius:10px;padding:10px 14px;text-align:center;min-width:90px;flex-shrink:0">
                <p style="font-size:11px;color:#92400e;font-weight:600;margin:0 0 4px">💸 অগ্রিম</p>
                <p style="font-size:18px;font-weight:700;color:#c2410c;margin:0">${totalAdvanceDays}</p>
              </div>
            </div>
          </div>
          <h4 style="font-size:12px;font-weight:600;color:var(--text);margin:10px 0 8px">📅 ক্যালেন্ডার</h4>
          <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border);padding:8px;background:var(--surface2)">
            <div style="min-width:max-content;padding:0 4px">
              <div class="calendar-header">${wdays.map(d => `<span style="min-width:48px">${d}</span>`).join('')}</div>
              <div class="calendar-grid" style="grid-template-columns:repeat(7,48px)">${cells}</div>
            </div>
          </div>
          ${hdList ? `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">${hdList}</div>` : ''}
        `;
      } else if (activeTab === 'overtime') {
        const ot = emp.overtime?.[key] || {};
        content = `<h4 style="font-weight:600;margin-bottom:12px">⏱ ওভারটাইম রেকর্ড</h4>
          <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px">OT রেট: ৳${(emp.otRate || Math.round(emp.wage / 8))}/ঘন্টা</p>
          <div class="form-group">
            <label>দিন</label>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px" id="otGrid"></div>
            <button class="btn btn-success btn-sm" onclick="addOT()">➕ যোগ করুন</button>
          </div>
        `;
      } else if (activeTab === 'ledger') {
        const led = emp.ledger?.[key] || { bonus: 0, advance: 0 };
        content = `<h4 style="font-weight:600;margin-bottom:12px">💰 বোনাস ও অগ্রিম</h4>
          <div style="display:grid;gap:10px">
            <div style="background:var(--success-light);padding:10px;border-radius:8px">
              <p style="font-size:11px;color:var(--text-muted)">বোনাস</p>
              <p style="font-size:18px;font-weight:700;color:var(--success)">৳${(led.bonus || 0).toLocaleString()}</p>
            </div>
            <div style="background:var(--danger-light);padding:10px;border-radius:8px">
              <p style="font-size:11px;color:var(--text-muted)">অগ্রিম</p>
              <p style="font-size:18px;font-weight:700;color:var(--danger)">৳${(led.advance || 0).toLocaleString()}</p>
            </div>
          </div>
        `;
      }

      const tabs = `
        <div class="tabs no-print">
          <button class="tab ${activeTab === 'hajira' ? 'active' : ''}" onclick="activeTab='hajira';renderProfile()">📅 হাজিরা</button>
          <button class="tab ${activeTab === 'settlement' ? 'active' : ''}" onclick="activeTab='settlement';renderProfile()">💸 হিসাব</button>
          <button class="tab ${activeTab === 'overtime' ? 'active' : ''}" onclick="activeTab='overtime';renderProfile()">⏱ OT</button>
          <button class="tab ${activeTab === 'ledger' ? 'active' : ''}" onclick="activeTab='ledger';renderProfile()">💰 বোনাস</button>
          <button class="tab ${activeTab === 'payment' ? 'active' : ''}" onclick="activeTab='payment';renderProfile()">🧾 পেমেন্ট</button>
        </div>
      `;

      if (activeTab === 'payment') {
        const payments = (emp.payments || []).filter(p => p.monthKey === key).sort((a, b) => new Date(b.date) - new Date(a.date));
        content = `<h4 style="font-weight:600;margin-bottom:12px">🧾 পেমেন্ট হিস্ট্রি</h4>
          <div style="display:grid;gap:8px">
            ${payments.map((p, i) => `
              <div style="background:var(--surface2);padding:10px;border-radius:8px;border-left:3px solid ${p.type === 'salary' ? 'var(--success)' : 'var(--warning)'}">
                <div style="display:flex;justify-content:space-between;align-items:start">
                  <div>
                    <p style="font-size:11px;font-weight:600;margin:0">${p.type === 'salary' ? '💵 বেতন' : '💸 ' + p.type}</p>
                    <p style="font-size:10px;color:var(--text-muted);margin:0">${new Date(p.date).toLocaleDateString('bn-BD')}</p>
                    ${p.note ? `<p style="font-size:10px;color:var(--text-muted);margin:4px 0 0">${p.note}</p>` : ''}
                  </div>
                  <p style="font-size:14px;font-weight:700;color:var(--success);margin:0">৳${p.amount.toLocaleString()}</p>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      document.getElementById('profileContent').innerHTML = tabs + content;
    }

    function dayClick(e, d) {
      const emp = employees.find(e => e.id === selectedEmpId);
      if (!emp) return;
      const key = curKey();
      const popup = document.getElementById('attPopup');
      popup.innerHTML = `
        <button onclick="setDay('${key}', ${d}, 'p')" style="background:var(--success-light);color:var(--success);font-weight:600">✅ পূর্ণ হাজিরা</button>
        <button onclick="setDay('${key}', ${d}, 'h')" style="background:var(--warning-light);color:var(--warning);font-weight:600">🌓 অর্ধবেলা</button>
        <button onclick="setDay('${key}', ${d}, 'a')" style="background:var(--danger-light);color:var(--danger);font-weight:600">❌ অনুপস্থিত</button>
        <button onclick="setDay('${key}', ${d}, 'holiday')" style="background:var(--purple-light);color:var(--purple);font-weight:600">🎉 ছুটি (পেইড)</button>
        <hr style="margin:6px 0;border:none;border-top:1px solid var(--border)">
        <div style="padding:8px"><input type="number" id="advAmount" class="input-field" placeholder="টাকা" style="margin-bottom:6px"><button class="btn btn-sm" style="width:100%" onclick="addDailyAdvance('${key}', ${d})">💸 দৈনিক অগ্রিম</button></div>
        <button onclick="deleteDay('${key}', ${d})" style="color:var(--danger);background:var(--danger-light)">🗑️ মুছুন</button>
      `;
      popup.classList.add('show');
      popup.style.left = (e.clientX - 100) + 'px';
      popup.style.top = (e.clientY - 50) + 'px';
    }

    function setDay(key, day, status) {
      const emp = employees.find(e => e.id === selectedEmpId);
      if (!emp) return;
      if (!emp.attendance) emp.attendance = {};
      if (!emp.attendance[key]) emp.attendance[key] = {};
      emp.attendance[key][day] = status;
      document.getElementById('attPopup').classList.remove('show');
      save();
    }

    function deleteDay(key, day) {
      const emp = employees.find(e => e.id === selectedEmpId);
      if (!emp) return;
      if (emp.attendance?.[key]?.[day]) delete emp.attendance[key][day];
      if (emp.dailyAdvance?.[key]?.[day]) delete emp.dailyAdvance[key][day];
      document.getElementById('attPopup').classList.remove('show');
      save();
    }

    function addDailyAdvance(key, day) {
      const emp = employees.find(e => e.id === selectedEmpId);
      if (!emp) return;
      const amount = parseFloat(document.getElementById('advAmount').value);
      if (!amount) return;
      if (!emp.dailyAdvance) emp.dailyAdvance = {};
      if (!emp.dailyAdvance[key]) emp.dailyAdvance[key] = {};
      emp.dailyAdvance[key][day] = amount;
      
      // Auto-log to payments
      if (!emp.payments) emp.payments = [];
      emp.payments.push({
        id: Date.now(),
        amount: amount,
        type: 'daily_advance',
        note: `${day} তারিখ`,
        date: new Date().toISOString(),
        monthKey: key
      });
      
      document.getElementById('attPopup').classList.remove('show');
      save();
    }

    function addOT() {
      const emp = employees.find(e => e.id === selectedEmpId);
      if (!emp) return;
      const day = prompt('দিন (১-৩১):');
      const hours = prompt('ঘন্টা:');
      if (!day || !hours) return;
      const key = curKey();
      if (!emp.overtime) emp.overtime = {};
      if (!emp.overtime[key]) emp.overtime[key] = {};
      emp.overtime[key][day] = parseFloat(hours);
      save();
    }

    function addNewWorker() {
      toggleModal('addWorkerOverlay', true);
    }

    function saveNewWorker() {
      const name = document.getElementById('workerName').value;
      const role = document.getElementById('workerRole').value;
      const group = document.getElementById('workerGroup').value;
      const wage = parseFloat(document.getElementById('workerWage').value);
      if (!name || !wage) return alert('নাম এবং মজুরি দিন');
      employees.push({ id: Date.now(), name, role, group, wage, attendance: {}, overtime: {}, dailyAdvance: {}, ledger: {}, payments: [] });
      save();
      toggleModal('addWorkerOverlay', false);
      document.getElementById('workerName').value = '';
      document.getElementById('workerRole').value = '';
      document.getElementById('workerGroup').value = '';
      document.getElementById('workerWage').value = '';
    }

    function openMonthlyReport() {
      const key = curKey();
      document.getElementById('monthReportLabel').textContent = `${MONTHS_BN[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
      let html = `<div style="overflow-x:auto"><table class="report-table"><thead><tr><th>শ্রমিক</th><th>গ্রুপ</th><th>পূর্ণ</th><th>অর্ধ</th><th>ছুটি</th><th>দিন</th><th>OT(h)</th><th>মূল</th><th>OT</th><th>বোনাস</th><th>অগ্রিম</th><th>দৈনিক অগ্রিম</th><th>নিট</th></tr></thead><tbody>`;
      let td = 0, te = 0, totalDailyAdv = 0, totalMonthlyAdv = 0;
      employees.forEach(emp => {
        const s = calcEmpStats(emp, key);
        const led = emp.ledger?.[key] || { bonus: 0, advance: 0 };
        const dailyAdvanceSum = s.dailyAdvTotal || 0;
        const cls = s.earned < 0 ? 'danger-row' : '';
        td += s.days;
        te += s.earned;
        totalDailyAdv += dailyAdvanceSum;
        totalMonthlyAdv += led.advance || 0;
        html += `<tr class="${cls}"><td>${emp.name}</td><td>${emp.group || '—'}</td><td>${s.p}</td><td>${s.h}</td><td>${s.hol}</td><td>${s.days}</td><td>${s.otHours}</td><td>৳${(s.days * emp.wage).toLocaleString()}</td><td>৳${(s.otHours * s.otRate).toLocaleString()}</td><td>৳${led.bonus || 0}</td><td>৳${led.advance || 0}</td><td>৳${dailyAdvanceSum.toLocaleString()}</td><td><strong>${s.earned < 0 ? 'ঋণী ' : ''}৳${Math.abs(s.earned).toLocaleString()}</strong></td></tr>`;
      });
      html += `</tbody><tfoot><tr><td colspan="5"><strong>মোট</strong></td><td><strong>${td}</strong></td><td></td><td colspan="3"></td><td><strong>৳${totalMonthlyAdv.toLocaleString()}</strong></td><td><strong style="color:#c2410c">৳${totalDailyAdv.toLocaleString()}</strong></td><td><strong style="color:var(--danger)">৳${te.toLocaleString()}</strong></td></tr></tfoot></table></div>`;
      document.getElementById('monthlyTableContainer').innerHTML = html;
      toggleModal('monthOverlay', true);
    }

    function openSettings() {
      document.getElementById('orgName').value = localStorage.getItem('slp_orgName') || '';
      toggleModal('settingsOverlay', true);
    }

    function saveSettings() {
      const orgName = document.getElementById('orgName').value;
      localStorage.setItem('slp_orgName', orgName);
      alert('সংরক্ষিত হয়েছে');
      toggleModal('settingsOverlay', false);
    }

    function toggleTheme() {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelector('[onclick="toggleTheme()"]').textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('slp_theme', theme);
    }

    function toggleModal(id, show) {
      const modal = document.getElementById(id);
      if (!modal) return;
      if (show) modal.classList.add('show');
      else modal.classList.remove('show');
    }

    function prevMonth() {
      viewDate.setMonth(viewDate.getMonth() - 1);
      document.getElementById('monthLabel').textContent = `${MONTHS_BN[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
      render();
      if (selectedEmpId) renderProfile();
    }

    function nextMonth() {
      viewDate.setMonth(viewDate.getMonth() + 1);
      document.getElementById('monthLabel').textContent = `${MONTHS_BN[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
      render();
      if (selectedEmpId) renderProfile();
    }

    function curKey() {
      return `${viewDate.getFullYear()}-${viewDate.getMonth()}`;
    }

    function getKey(year, month) {
      return `${year}-${month}`;
    }

    function calcEmpStats(emp, key) {
      const att = emp.attendance?.[key] || {};
      const ot = emp.overtime?.[key] || {};
      const dailyAdv = emp.dailyAdvance?.[key] || {};
      const p = Object.values(att).filter(v => v === 'p').length;
      const h = Object.values(att).filter(v => v === 'h').length;
      const hol = Object.values(att).filter(v => v === 'holiday').length;
      const a = Object.values(att).filter(v => v === 'a').length;
      const days = p + h * 0.5 + hol;
      const otHours = Object.values(ot).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const otRate = emp.otRate || Math.round(emp.wage / 8);
      const dailyAdvTotal = Object.values(dailyAdv).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const led = emp.ledger?.[key] || { bonus: 0, advance: 0 };
      const earned = days * emp.wage + otHours * otRate + (led.bonus || 0) - (led.advance || 0) - dailyAdvTotal;
      return { p, h, a, hol, days, otHours, otRate, earned, dailyAdvTotal };
    }

    function pillsHTML(emp, key) {
      const s = calcEmpStats(emp, key);
      return `<div class="summary-pills">
        <span class="pill success">✅ ${s.p} পূর্ণ</span>
        <span class="pill warning">🌓 ${s.h} অর্ধ</span>
        <span class="pill danger">❌ ${s.a} অনুপস্থিত</span>
        <span class="pill">🎉 ${s.hol} ছুটি</span>
        ${s.dailyAdvTotal > 0 ? `<span class="pill" style="background:#fff7ed;color:#c2410c">💸 ৳${s.dailyAdvTotal}</span>` : ''}
      </div>`;
    }

    window.addEventListener('click', e => {
      if (!e.target.closest('#attPopup') && !e.target.closest('.day-cell')) {
        document.getElementById('attPopup').classList.remove('show');
      }
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
